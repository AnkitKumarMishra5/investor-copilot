<svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg" cx="56%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#13243f"/><stop offset="100%" stop-color="#0b1424"/>
    </radialGradient>
    <radialGradient id="hero" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.13"/><stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#46597a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="560" rx="20" fill="url(#bg)"/>
  <ellipse cx="650" cy="406" rx="280" ry="140" fill="url(#hero)"/>

  <!-- header -->
  <text x="44" y="50" fill="#eef2f9" font-size="26" font-weight="700">Investor Copilot — Architecture</text>
  <text x="45" y="77" fill="#7d8cab" font-size="14">One Next.js app. The model routes and writes; typed code computes and cites.</text>
  <g transform="translate(905,34)">
    <rect x="0" y="0" width="255" height="30" rx="15" fill="#10203a" stroke="#274063" stroke-width="1.2"/>
    <circle cx="18" cy="15" r="4" fill="#2dd4bf"/>
    <text x="32" y="20" fill="#9fb0cc" font-size="12.5" font-weight="500">grounded by tools · no vector DB</text>
  </g>

  <!-- connectors (under boxes) -->
  <g stroke-width="2" fill="none">
    <!-- browser <-> /api/chat -->
    <path d="M224,192 H296" stroke="#33455f" marker-end="url(#ar)"/>
    <path d="M296,222 H224" stroke="#33455f" marker-end="url(#ar)"/>
    <!-- /api/chat <-> runChatStream -->
    <path d="M484,192 H556" stroke="#33455f" marker-end="url(#ar)"/>
    <path d="M556,222 H484" stroke="#33455f" marker-end="url(#ar)"/>
    <!-- runChatStream <-> OpenAI -->
    <path d="M744,196 H936" stroke="#33455f" marker-end="url(#ar)"/>
    <path d="M936,216 H744" stroke="#33455f" marker-end="url(#ar)"/>
    <!-- runChatStream <-> compute -->
    <path d="M620,256 V356" stroke="#33455f" marker-end="url(#ar)"/>
    <path d="M680,356 V256" stroke="#33455f" marker-end="url(#ar)"/>
    <!-- compute <-> in-memory -->
    <path d="M744,406 H786" stroke="#33455f" marker-end="url(#ar)"/>
    <path d="M786,420 H744" stroke="#33455f" marker-end="url(#ar)"/>
  </g>

  <!-- animated flow -->
  <g filter="url(#glow)">
    <!-- forward request (cyan): ChatWindow -> /api/chat -> runChatStream -->
    <circle r="4" fill="#38bdf8"><animateMotion dur="2.0s" begin="0s"   repeatCount="indefinite" path="M130,192 H650"/></circle>
    <circle r="4" fill="#38bdf8"><animateMotion dur="2.0s" begin="1.0s" repeatCount="indefinite" path="M130,192 H650"/></circle>
    <!-- streamed reply (green): runChatStream -> /api/chat -> ChatWindow -->
    <circle r="3.6" fill="#34d399"><animateMotion dur="2.2s" begin="0s"   repeatCount="indefinite" path="M650,222 H130"/></circle>
    <circle r="3.6" fill="#34d399"><animateMotion dur="2.2s" begin="0.5s" repeatCount="indefinite" path="M650,222 H130"/></circle>
    <circle r="3.6" fill="#34d399"><animateMotion dur="2.2s" begin="1.0s" repeatCount="indefinite" path="M650,222 H130"/></circle>
    <circle r="5"   fill="#34d399"><animateMotion dur="2.2s" begin="1.5s" repeatCount="indefinite" path="M650,222 H130"/></circle>
    <!-- tool loop (purple) -->
    <circle r="3.6" fill="#a78bfa"><animateMotion dur="1.0s" begin="0s"   repeatCount="indefinite" path="M744,196 H936"/></circle>
    <circle r="3.6" fill="#a78bfa"><animateMotion dur="1.0s" begin="0.5s" repeatCount="indefinite" path="M936,216 H744"/></circle>
    <!-- compute (teal) -->
    <circle r="3.8" fill="#2dd4bf"><animateMotion dur="1.1s" begin="0.2s" repeatCount="indefinite" path="M620,256 V356"/></circle>
    <circle r="3.8" fill="#2dd4bf"><animateMotion dur="1.1s" begin="0.8s" repeatCount="indefinite" path="M680,356 V256"/></circle>
    <circle r="3.2" fill="#2dd4bf"><animateMotion dur="0.7s" begin="0.4s" repeatCount="indefinite" path="M744,406 H786"/></circle>
  </g>

  <!-- ===== boxes ===== -->
  <!-- Browser / ChatWindow -->
  <g>
    <rect x="40" y="160" width="180" height="92" rx="14" fill="#131d31" stroke="#26344b" stroke-width="1.5"/>
    <g transform="translate(58,178)" stroke="#38bdf8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="18" height="12" rx="2"/><path d="M7,20 H15 M11,14 V20"/>
    </g>
    <text x="88" y="192" fill="#e8edf6" font-size="15" font-weight="600">Browser</text>
    <text x="58" y="216" fill="#7dd3fc" font-size="12" font-weight="500">ChatWindow</text>
    <text x="58" y="236" fill="#8190ab" font-size="10.5">sends + reads stream</text>
  </g>
  <!-- /api/chat -->
  <g>
    <rect x="300" y="160" width="180" height="92" rx="14" fill="#131d31" stroke="#26344b" stroke-width="1.5"/>
    <g transform="translate(318,177)" stroke="#38bdf8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="16" height="6" rx="1.5"/><rect x="2" y="11" width="16" height="6" rx="1.5"/><path d="M5,5 H5.01 M5,14 H5.01"/>
    </g>
    <text x="346" y="190" fill="#e8edf6" font-size="14.5" font-weight="600">/api/chat</text>
    <text x="318" y="214" fill="#8190ab" font-size="11">route.ts</text>
    <text x="318" y="234" fill="#8190ab" font-size="11">ReadableStream</text>
  </g>
  <!-- runChatStream -->
  <g>
    <rect x="560" y="160" width="180" height="92" rx="14" fill="#14223a" stroke="#3b5675" stroke-width="1.6"/>
    <g transform="translate(576,176)" stroke="#38bdf8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3,11 a7,7 0 0 1 12,-4"/><path d="M15,3 V7 H11"/><path d="M19,11 a7,7 0 0 1 -12,4"/><path d="M7,19 V15 H11"/>
    </g>
    <text x="606" y="189" fill="#e8edf6" font-size="14" font-weight="600">runChatStream</text>
    <text x="576" y="213" fill="#7dd3fc" font-size="11" font-weight="500">orchestrator.ts</text>
    <text x="576" y="233" fill="#8190ab" font-size="10.5">tool loop · emits status</text>
  </g>
  <!-- OpenAI -->
  <g>
    <rect x="940" y="160" width="180" height="92" rx="14" fill="#161435" stroke="#5b4ba0" stroke-width="1.6"/>
    <g transform="translate(956,176)" stroke="#a78bfa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10,2 L11.6,8.4 L18,10 L11.6,11.6 L10,18 L8.4,11.6 L2,10 L8.4,8.4 Z"/>
    </g>
    <text x="984" y="189" fill="#e8edf6" font-size="15" font-weight="600">OpenAI</text>
    <text x="956" y="213" fill="#c4b5fd" font-size="11" font-weight="500">external API</text>
    <text x="956" y="233" fill="#8190ab" font-size="10.5">routes + writes · no math</text>
  </g>
  <!-- runTool + compute (hero) -->
  <g>
    <rect x="560" y="360" width="180" height="92" rx="14" fill="#10231f" stroke="#2dd4bf" stroke-width="1.8"/>
    <g transform="translate(576,377)" stroke="#2dd4bf" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7,3 L2,10 L7,17"/><path d="M14,3 L19,10 L14,17"/>
    </g>
    <text x="606" y="390" fill="#eafdfa" font-size="13.5" font-weight="600">runTool + compute</text>
    <text x="576" y="414" fill="#8fc9c0" font-size="11">lib/compute · FX · MOIC</text>
    <text x="576" y="434" fill="#39b7a6" font-size="10.5" font-weight="600">deterministic → value + sources</text>
  </g>
  <!-- In-memory -->
  <g>
    <rect x="790" y="360" width="180" height="92" rx="14" fill="#131d31" stroke="#26344b" stroke-width="1.5"/>
    <g transform="translate(806,376)" stroke="#38bdf8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="10" cy="4" rx="8" ry="2.6"/><path d="M2,4 V16 a8,2.6 0 0 0 16,0 V4"/><path d="M2,10 a8,2.6 0 0 0 16,0"/>
    </g>
    <text x="836" y="389" fill="#e8edf6" font-size="14" font-weight="600">In-memory</text>
    <text x="806" y="413" fill="#8190ab" font-size="11">getStore() · loaded once</text>
    <text x="806" y="433" fill="#5f86ab" font-size="10.5" font-weight="600">indexed · in-process</text>
  </g>

  <!-- labels -->
  <g font-size="10.5" fill="#8a99b6">
    <text x="260" y="183" text-anchor="middle">request →</text>
    <text x="260" y="240" text-anchor="middle">← reply (stream)</text>
    <text x="520" y="183" text-anchor="middle" font-size="10">runChatStream(emit)</text>
    <text x="840" y="182" text-anchor="middle" font-size="11.5" fill="#9fb0cc" font-weight="600">tool loop (≤ 6 rounds)</text>
    <text x="840" y="240" text-anchor="middle" font-size="9.5">messages + tools ⇄ tool calls / text</text>
    <text x="588" y="312" font-size="10">runTool</text>
    <text x="690" y="312" font-size="10">{result, sources}</text>
    <text x="765" y="398" text-anchor="middle" font-size="10">in-process</text>
  </g>

  <!-- caption -->
  <g font-size="12" fill="#93a2bd">
    <text x="44" y="500"><tspan fill="#cfe7df" font-weight="600">Request:</tspan> ChatWindow sends the question to /api/chat, which opens a stream and calls runChatStream.</text>
    <text x="44" y="520"><tspan fill="#cfe7df" font-weight="600">Loop:</tspan> runChatStream and OpenAI run up to 6 rounds. The model picks a tool, runTool computes it from in-memory data, then the result feeds back.</text>
    <text x="44" y="540"><tspan fill="#cfe7df" font-weight="600">Reply:</tspan> the answer streams back through /api/chat to ChatWindow (live status, then the answer). Every number comes from compute, with its source rows.</text>
  </g>
</svg>
