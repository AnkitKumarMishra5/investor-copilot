<svg viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="756" height="536" rx="18" fill="#ffffff" stroke="#e7e9ee" stroke-width="1.5" filter="url(#soft)"/>

  <!-- header -->
  <circle cx="30" cy="32" r="7" fill="#0f766e"/>
  <text x="44" y="37" fill="#1f2937" font-size="16" font-weight="700">Investor Copilot</text>
  <g>
    <rect x="520" y="18" width="216" height="30" rx="15" fill="#f3f4f6" stroke="#e5e7eb"/>
    <circle cx="538" cy="33" r="8" fill="#c7d2fe"/>
    <text x="554" y="37" fill="#4b5563" font-size="12">INV001 · Idris Olawale · GBP</text>
  </g>
  <line x1="24" y1="58" x2="736" y2="58" stroke="#eef0f3" stroke-width="1.4"/>

  <!-- user bubble -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.044;0.061;1" dur="9s" repeatCount="indefinite"/>
    <rect x="430" y="80" width="306" height="44" rx="14" fill="#2563eb"/>
    <text x="450" y="107" fill="#ffffff" font-size="13.5">How's my portfolio doing overall?</text>
  </g>

  <!-- ================= thinking snapshots ================= -->
  <!-- snap 1 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.089;0.100;0.211;0.222;1" dur="9s" repeatCount="indefinite"/>
    <rect x="40" y="142" width="340" height="56" rx="14" fill="#ffffff" stroke="#e7e9ee"/>
    <circle cx="62" cy="170" r="4" fill="#2563eb"/>
    <text x="76" y="175" fill="#2563eb" font-size="13" font-weight="500">Understanding your question</text>
    <g fill="#2563eb">
      <circle cx="262" cy="171" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="271" cy="171" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></circle>
      <circle cx="280" cy="171" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></circle>
    </g>
  </g>
  <!-- snap 2 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.211;0.222;0.322;0.333;1" dur="9s" repeatCount="indefinite"/>
    <rect x="40" y="142" width="340" height="82" rx="14" fill="#ffffff" stroke="#e7e9ee"/>
    <text x="62" y="171" fill="#9ca3af" font-size="13">✓</text><text x="76" y="171" fill="#9ca3af" font-size="13">Understanding your question</text>
    <circle cx="62" cy="196" r="4" fill="#2563eb"/>
    <text x="76" y="201" fill="#2563eb" font-size="13" font-weight="500">Pulling your portfolio</text>
    <g fill="#2563eb">
      <circle cx="232" cy="197" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="241" cy="197" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></circle>
      <circle cx="250" cy="197" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></circle>
    </g>
  </g>
  <!-- snap 3 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.322;0.333;0.433;0.444;1" dur="9s" repeatCount="indefinite"/>
    <rect x="40" y="142" width="340" height="108" rx="14" fill="#ffffff" stroke="#e7e9ee"/>
    <text x="62" y="171" fill="#9ca3af" font-size="13">✓</text><text x="76" y="171" fill="#9ca3af" font-size="13">Understanding your question</text>
    <text x="62" y="197" fill="#9ca3af" font-size="13">✓</text><text x="76" y="197" fill="#9ca3af" font-size="13">Pulling your portfolio</text>
    <circle cx="62" cy="222" r="4" fill="#2563eb"/>
    <text x="76" y="227" fill="#2563eb" font-size="13" font-weight="500">Computing from portfolio data</text>
    <g fill="#2563eb">
      <circle cx="285" cy="223" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="294" cy="223" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></circle>
      <circle cx="303" cy="223" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></circle>
    </g>
  </g>
  <!-- snap 4 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.433;0.444;0.522;0.533;1" dur="9s" repeatCount="indefinite"/>
    <rect x="40" y="142" width="340" height="134" rx="14" fill="#ffffff" stroke="#e7e9ee"/>
    <text x="62" y="171" fill="#9ca3af" font-size="13">✓</text><text x="76" y="171" fill="#9ca3af" font-size="13">Understanding your question</text>
    <text x="62" y="197" fill="#9ca3af" font-size="13">✓</text><text x="76" y="197" fill="#9ca3af" font-size="13">Pulling your portfolio</text>
    <text x="62" y="223" fill="#9ca3af" font-size="13">✓</text><text x="76" y="223" fill="#9ca3af" font-size="13">Computing from portfolio data</text>
    <circle cx="62" cy="248" r="4" fill="#2563eb"/>
    <text x="76" y="253" fill="#2563eb" font-size="13" font-weight="500">Writing your answer</text>
    <g fill="#2563eb">
      <circle cx="206" cy="249" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="215" cy="249" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></circle>
      <circle cx="224" cy="249" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- ================= answer ================= -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.522;0.539;1" dur="9s" repeatCount="indefinite"/>
    <rect x="40" y="142" width="448" height="346" rx="14" fill="#ffffff" stroke="#e7e9ee"/>
    <text x="60" y="174" fill="#374151" font-size="13.5">Here's your portfolio at a glance.</text>

    <!-- stats -->
    <text x="60" y="206" fill="#6b7280" font-size="11">Current value</text>
    <text x="60" y="228" fill="#111827" font-size="16" font-weight="700">£438,495</text>
    <text x="210" y="206" fill="#6b7280" font-size="11">Contributed</text>
    <text x="210" y="228" fill="#111827" font-size="16" font-weight="700">£168,593</text>
    <text x="340" y="206" fill="#6b7280" font-size="11">MOIC</text>
    <text x="340" y="228" fill="#0f766e" font-size="16" font-weight="700">2.60×</text>

    <!-- holdings -->
    <line x1="60" y1="248" x2="468" y2="248" stroke="#eef0f3"/>
    <text x="60" y="276" fill="#374151" font-size="13">Forgecraft Robotics</text>
    <text x="250" y="276" fill="#9ca3af" font-size="12">3 rounds</text>
    <text x="448" y="276" fill="#111827" font-size="13" font-weight="600" text-anchor="end">£274,094</text>
    <text x="60" y="302" fill="#374151" font-size="13">Inferna AI</text>
    <text x="250" y="302" fill="#9ca3af" font-size="12">Series B</text>
    <text x="448" y="302" fill="#111827" font-size="13" font-weight="600" text-anchor="end">£164,400</text>
    <line x1="60" y1="320" x2="468" y2="320" stroke="#eef0f3"/>

    <text x="60" y="346" fill="#9ca3af" font-size="12">▸ Thought for 4s · 4 steps</text>
    <text x="60" y="374" fill="#2563eb" font-size="12.5" font-weight="500">▾ Show the math · 4 source rows</text>
  </g>

  <!-- source panel (expands) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.667;0.689;1" dur="9s" repeatCount="indefinite"/>
    <rect x="56" y="386" width="416" height="86" rx="10" fill="#f9fafb" stroke="#eef0f3"/>
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11">
      <rect x="70" y="400" width="66" height="22" rx="6" fill="#eef2ff" stroke="#e0e7ff"/><text x="80" y="415" fill="#3730a3">ALC0001</text>
      <rect x="146" y="400" width="60" height="22" rx="6" fill="#ecfdf5" stroke="#d1fae5"/><text x="156" y="415" fill="#065f46">VAL004</text>
      <rect x="216" y="400" width="66" height="22" rx="6" fill="#fef3c7" stroke="#fde68a"/><text x="226" y="415" fill="#92400e">DEAL001</text>
      <rect x="292" y="400" width="92" height="22" rx="6" fill="#f3f4f6" stroke="#e5e7eb"/><text x="302" y="415" fill="#374151">fx:USD→GBP</text>
    </g>
    <text x="70" y="450" fill="#6b7280" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11">17,777.78 units × $15.40  →  $273,778  →  £202,798</text>
  </g>

  <!-- caption -->
  <text x="60" y="514" fill="#b6bcc6" font-size="11">Illustrative UI mock · numbers computed in TypeScript and cited; the model only routes and writes.</text>
</svg>
